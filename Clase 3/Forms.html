
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
 </head>
 <body>
    
<h1 align="center">Formulario</h1>

<label for="nombre">Nombre:</label>
<input type="text" id="nombre" name="nombre">


<label for="apellido">Apellido:</label>
<input type="text" id="apellido" name="apellido">

<br> 


<label for="sexo">Sexo:</label>
<select id="sexo" name="sexo" required>
    <option value="">Seleccionar</option>
    <option value="masculino">Masculino</option>
    <option value="femenino">Femenino</option>
</select>


<label for="correo">Correo Electrónico:</label>
<input type="email" id="correo" name="correo" required>

<br>

<input type="checkbox" id="condiciones" name="condiciones" required>
<label for="condiciones">Deseo rcibir informacion sobre novedades y ofertas</label>


<br>

<input type="checkbox" id="condiciones" name="condiciones" required>
<label for="condiciones">Declaro haber leído y aceptar las condiciones generales del programa y la normativa sobre protección de datos</label>

<br>

<button type="submit">Enviar</button>

 </body>
 </html>
